# VulnForge AI - orquestracao do pipeline minimo (offline, sem GPU).
# Sem o campo `version:` (obsoleto no Docker Compose v2 - gera aviso).
#
#   docker compose up --build           # roda o teste minimo completo
#   docker compose run --rm vulnforge bash    # shell interativo no container
services:
  vulnforge:
    build: .
    image: vulnforge-ai:latest
    # Volumes com PATH RELATIVO (nunca caminho pessoal). Resultados ficam no host.
    volumes:
      - ./data:/app/data
      - ./scenarios:/app/scenarios
      - ./reports:/app/reports
    # Sobrescreve o CMD apenas se quiser outro comando; default = teste minimo.
    command: ["bash", "scripts/run-minimal.sh"]
